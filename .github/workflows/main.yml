name: "Platform CI/CD Pipeline"

# Standardizing the development lifecycle for HIPAA-compliant MedTech platform.
# Includes Backend (Java/Gradle), Frontend (Next.js/pnpm/Turbo), and deployment hooks.

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ==========================================
  # ☕ Backend CI (Java/Spring Boot)
  # ==========================================
  backend-ci:
    name: "Backend CI (Java 21)"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build and Test
        # 'build' includes assemble and test. 'jacocoRootReport' aggregates coverage.
        run: ./gradlew build jacocoRootReport --no-daemon
        env:
          TEST_DOCKER_SKIP_IF_UNAVAILABLE: "true"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            **/build/test-results/test/*.xml
            **/build/reports/tests/test/
            build/reports/jacoco/aggregate/

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/build/reports/jacoco/test/jacocoTestReport.xml,build/reports/jacoco/aggregate/jacocoRootReport.xml"
          fail_ci_if_error: false

  # ==========================================
  # 🌐 Frontend CI (Next.js/Turbo)
  # ==========================================
  frontend-ci:
    name: "Frontend CI (Next.js)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './frontend/pnpm-lock.yaml'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Code Quality Checks
        # Runs lint and type checking across the monorepo via Turbo
        run: |
          pnpm lint
          pnpm check-types

      - name: Run Tests
        run: pnpm test

      - name: Build Applications
        run: pnpm build

      - name: Upload Frontend Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-artifacts
          path: |
            frontend/apps/**/.next/
            frontend/**/dist/

  # ==========================================
  # 🚀 Deployment Hook (Governance & Ops)
  # ==========================================
  deploy-staging:
    name: "Deploy to Staging"
    needs: [backend-ci, frontend-ci]
    # Automatically deploy to staging when merging into main or develop
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Trigger Staging Deployment
        run: |
          echo "Initiating automated deployment to Staging environment..."
          echo "Commit SHA: ${{ github.sha }}"
          # Add actual deployment commands here (e.g., terraform apply or helm upgrade)
