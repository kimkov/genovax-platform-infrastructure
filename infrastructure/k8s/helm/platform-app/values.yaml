replicaCount: 3

nameOverride: ""
fullnameOverride: ""
podAnnotations: {}
imagePullSecrets: []
nodeSelector: {}
tolerations: []
affinity: {}

image:
  repository: platform/phi-processor
  tag: ""
  pullPolicy: IfNotPresent

# IRSA: Integration with IAM Role
serviceAccount:
  create: true
  name: "phi-processor"
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::000000000000:role/platform-prod-cluster-phi-processor-role"
    eks.amazonaws.com/sts-regional-endpoints: "true"
  automountServiceAccountToken: false

# Security
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# AWS Load Balancer Controller
alb:
  certificateArn: "arn:aws:acm:region:000000000000:certificate/uuid"
  logBucketName: "platform-alb-logs"
  wafAclArn: "arn:aws:wafv2:region:000000000000:regional/webacl/name/uuid"
  sslRedirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

pdb:
  enabled: true
  minAvailable: 2
  maxUnavailable: 1

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix

secrets:
  enabled: true
  secretProviderClassName: "phi-app-secrets"

# List of secrets in AWS Secrets Manager
  objects:
    - objectName: "prod/rds/password"
      objectAlias: "DB_PASSWORD"
      objectType: "secretsmanager"
    - objectName: "prod/api/key"
      objectAlias: "API_KEY"
      objectType: "secretsmanager"

  # Creating a Native K8s Secret
  secretObjects:
    - secretName: "phi-app-runtime-secrets"
      type: Opaque
      data:
        - objectName: "DB_PASSWORD" # Refers to the objectAlias from the list above
          key: "database-password"   # The key that will be inside the generated K8s Secret
        - objectName: "API_KEY"
          key: "api-key"